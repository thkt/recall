[package]
name = "recall"
version = "0.3.0"
edition = "2024"
description = "Full-text search CLI for past Claude Code and Codex sessions"
license = "MIT"
repository = "https://github.com/thkt/recall"

[dependencies]
anyhow = "1"
bytemuck = "1"
clap = { version = "4", features = ["derive", "env"] }
dirs = "6"
indicatif = "0.17"
ndarray = "0.16"
ort = { version = "2.0.0-rc.12", features = ["download-binaries", "coreml"] }
rusqlite = { version = "0.38", features = ["bundled"] }
serde_json = "1"
sha2 = "0.10"
sqlite-vec = "0.1.6"
tokenizers = { version = "0.21", default-features = false, features = ["onig"] }

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
