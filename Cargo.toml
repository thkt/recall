[package]
name = "recall"
version = "0.5.0"
edition = "2024"
description = "Full-text search CLI for past Claude Code and Codex sessions"
license = "MIT"
repository = "https://github.com/thkt/recall"

[features]
default = ["mlx"]
mlx = ["dep:mlx-rs"]
candle = ["dep:candle-core", "dep:candle-nn", "dep:candle-transformers"]

[dependencies]
anyhow = "1"
bytemuck = "1"
candle-core = { version = "0.9", optional = true }
candle-nn = { version = "0.9", optional = true }
candle-transformers = { version = "0.9", optional = true }
clap = { version = "4", features = ["derive", "env"] }
dirs = "6"
hf-hub = "0.4"
rusqlite = { version = "0.38", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
sqlite-vec = "0.1.6"
mlx-rs = { version = "0.25", optional = true }
tokenizers = { version = "0.21", default-features = false, features = ["onig"] }

[dev-dependencies]
serial_test = "3"
tempfile = "3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
