[package]
name = "recall"
version = "0.2.2"
edition = "2024"
description = "Full-text search CLI for past Claude Code and Codex sessions"
license = "MIT"
repository = "https://github.com/thkt/recall"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
dirs = "6"
rusqlite = { version = "0.38", features = ["bundled"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
