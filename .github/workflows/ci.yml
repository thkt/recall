name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format check
        run: cargo fmt -- --check

      - name: Install nextest
        uses: taiki-e/install-action@3d832235cb306500b868c2632a137d48634568cd # v2.81.0
        with:
          tool: cargo-nextest

      - name: Test
        run: cargo nextest run --profile ci

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  coverage:
    # Diff coverage gate: fail when coverage of the lines this PR adds or
    # changes drops below the threshold, so new uncovered code (pub fn /
    # branches) cannot merge untested. No overall-percent floor (which would
    # flag existing unreachable code); no base-vs-PR double measurement.
    # Rationale: ported from yomu (Issue #223), THRESHOLDS.md "Coverage".
    # Runs on macos like the test job: the rurico dependency pulls mlx-sys
    # (MLX FFI), which needs BLAS + Apple silicon and cannot build on Linux.
    # Mirrors the test job's default feature set so coverage matches what
    # the tests exercise.
    runs-on: macos-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@3d832235cb306500b868c2632a137d48634568cd # v2.81.0
        with:
          tool: cargo-llvm-cov

      - name: Generate lcov coverage
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Test coverage filter script
        run: |
          # The cfg(test) filter gates coverage; a brace-counting regression
          # could silently strip production lines, so test it before use.
          python3 -m venv /tmp/pytest-venv
          /tmp/pytest-venv/bin/pip install --quiet pytest
          /tmp/pytest-venv/bin/python -m pytest .github/scripts/test_filter_lcov_cfg_test.py -q

      - name: Strip cfg(test) blocks from lcov via filter script
        run: |
          python3 .github/scripts/filter_lcov_cfg_test.py \
            lcov.info \
            lcov.filtered.info \
            --repo-root "$GITHUB_WORKSPACE"

      - name: Diff coverage gate (changed lines >= 95%)
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          # diff-cover is a Python tool; isolate it in a venv to avoid PEP 668
          # (externally-managed environments) regardless of the runner's Python.
          python3 -m venv /tmp/diff-cover-venv
          /tmp/diff-cover-venv/bin/pip install --quiet diff-cover
          /tmp/diff-cover-venv/bin/diff-cover lcov.filtered.info \
            --compare-branch=origin/main \
            --fail-under=95

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install cargo-deny and cargo-audit
        uses: taiki-e/install-action@3d832235cb306500b868c2632a137d48634568cd # v2.81.0
        with:
          tool: cargo-deny,cargo-audit

      - name: Deny check
        run: cargo-deny check

      - name: Audit
        run: cargo-audit audit
